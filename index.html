<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="구구단"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#1A237E"/>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
  <title>구구단 게임 🕊️</title>
  <style>
    :root {
      --bg:      #0F1B35;
      --card:    rgba(255,255,255,.08);
      --border:  rgba(255,255,255,.12);
      --accent:  #F5A623;
      --gold:    #FFD700;
      --correct: #00C853;
      --wrong:   #FF1744;
      --text2:   rgba(255,255,255,.55);
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none; }
    html,body { width:100%; height:100%; overflow:hidden; font-family:-apple-system,'Helvetica Neue',sans-serif; background:var(--bg); }

    /* ── SCREENS ── */
    .screen { position:fixed; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center;
      background:linear-gradient(160deg,#0F1B35 0%,#1A237E 55%,#0D1B2A 100%); }
    .screen.active { display:flex; }

    /* ── BUTTONS ── */
    .btn { border:none; border-radius:50px; font-family:inherit; font-weight:800; cursor:pointer; transition:transform .1s,opacity .1s; }
    .btn:active { transform:scale(.94); opacity:.9; }
    .btn-primary { background:var(--accent); color:#1A0A00; font-size:20px; padding:16px 48px;
      box-shadow:0 4px 0 #9A6600,0 6px 20px rgba(245,166,35,.35); }
    .btn-ghost { background:rgba(255,255,255,.1); color:#fff; font-size:15px; padding:11px 28px; }
    .btn-sm { font-size:14px; padding:10px 22px; }

    /* ══ SPLASH ══ */
    #s-splash { gap:10px; }
    #splash-bird { animation:float 2.2s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
    .splash-bubble { background:#fff; color:#333; font-size:15px; font-weight:800;
      padding:7px 18px; border-radius:24px; position:relative; }
    .splash-bubble::after { content:''; position:absolute; bottom:-10px; left:50%; transform:translateX(-50%);
      border:6px solid transparent; border-top-color:#fff; }
    .splash-title { font-size:40px; font-weight:900; color:#fff; letter-spacing:-1px; margin-top:14px; }
    .splash-title em { color:var(--accent); font-style:normal; }

    /* ══ HOME ══ */
    #s-home { gap:18px; padding:30px 24px; }
    .home-title { font-size:34px; font-weight:900; color:#fff; text-align:center; }
    .home-title em { color:var(--accent); font-style:normal; }
    .home-best { font-size:14px; color:var(--text2); }
    .home-best b { color:var(--gold); }

    /* ══ GAME ══ */
    #s-game { justify-content:flex-start; padding:0 16px 20px; gap:0; }

    .top-bar { width:100%; max-width:420px; display:flex; align-items:center;
      justify-content:space-between; padding:14px 2px 10px; }
    .lives { display:flex; gap:5px; }
    .stage-badge { background:rgba(255,255,255,.1); border-radius:20px;
      padding:5px 16px; font-size:13px; font-weight:800; color:#fff; }
    .stage-badge em { color:var(--accent); font-style:normal; font-size:16px; }

    .q-card { width:100%; max-width:420px; background:var(--card); border:1px solid var(--border);
      border-radius:26px; padding:30px 20px 26px; text-align:center; backdrop-filter:blur(8px); margin-bottom:14px; }
    .q-label { font-size:12px; color:var(--text2); margin-bottom:10px; letter-spacing:.5px; }
    .q-text  { font-size:54px; font-weight:900; color:#fff; letter-spacing:-2px; }

    .timer-wrap { margin-bottom:16px; }
    .timer-svg text { font-family:-apple-system,'Helvetica Neue',sans-serif; }

    .choices { width:100%; max-width:420px; display:flex; flex-direction:column; gap:10px; }
    .c-btn {
      width:100%; padding:17px 20px; border:1px solid var(--border); border-radius:18px;
      background:var(--card); color:#fff; font-family:inherit; font-size:28px; font-weight:900;
      cursor:pointer; display:flex; align-items:center; gap:16px; transition:transform .1s, background .15s;
    }
    .c-btn:active:not(:disabled) { transform:scale(.97); }
    .c-btn .idx { font-size:13px; font-weight:700; color:var(--text2); min-width:18px; }
    .c-btn.correct { background:rgba(0,200,83,.22); border-color:var(--correct); }
    .c-btn.wrong   { background:rgba(255,23,68,.22);  border-color:var(--wrong);   }
    .c-btn:disabled { cursor:default; }

    /* ── Flash ── */
    #flash { position:fixed; inset:0; pointer-events:none; opacity:0; z-index:99; }
    #flash.g { background:rgba(0,200,83,.2);  animation:fa .45s ease-out forwards; }
    #flash.r { background:rgba(255,23,68,.2); animation:fa .5s  ease-out forwards; }
    @keyframes fa { 0%{opacity:1} 100%{opacity:0} }

    /* ══ RESULT ══ */
    #s-result { gap:12px; padding:28px 24px; }
    .res-emoji { font-size:66px; }
    .res-title { font-size:26px; font-weight:900; color:#fff; }
    .res-num   { font-size:80px; font-weight:900; color:var(--accent); line-height:1; }
    .res-sub   { font-size:13px; color:var(--text2); }
    .name-input {
      width:100%; max-width:340px; background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.22); border-radius:16px;
      padding:14px 18px; font-family:inherit; font-size:18px; font-weight:700;
      color:#fff; outline:none; text-align:center;
    }
    .name-input::placeholder { color:rgba(255,255,255,.3); }
    .res-btns { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }

    /* ══ LEADERBOARD ══ */
    #s-board { justify-content:flex-start; padding:28px 20px 20px; gap:12px; overflow-y:auto; }
    .board-hd { font-size:24px; font-weight:900; color:#fff; }
    .board-list { width:100%; max-width:420px; display:flex; flex-direction:column; gap:8px; }
    .b-row { background:var(--card); border:1px solid var(--border); border-radius:14px;
      padding:13px 16px; display:flex; align-items:center; gap:12px; }
    .b-rank { font-size:18px; font-weight:900; color:var(--text2); min-width:32px; }
    .b-rank.g1 { color:#FFD700; } .b-rank.g2 { color:#C0C0C0; } .b-rank.g3 { color:#CD7F32; }
    .b-name  { flex:1; font-size:16px; font-weight:700; color:#fff; }
    .b-score { font-size:20px; font-weight:900; color:var(--accent); }
    .b-empty { text-align:center; color:var(--text2); font-size:14px; padding:24px 0; }
  </style>
</head>
<body>

<!-- ══ SPLASH ══ -->
<div id="s-splash" class="screen active">
  <div id="splash-bird"></div>
  <div class="splash-bubble">구구~ 구구~! 🕊️</div>
  <div class="splash-title"><em>구구</em>단 게임</div>
</div>

<!-- ══ HOME ══ -->
<div id="s-home" class="screen">
  <div id="home-bird" style="margin-bottom:6px"></div>
  <div class="home-title"><em>구구</em>단 게임</div>
  <div class="home-best" id="home-best">최고 기록: <b>–</b></div>
  <button class="btn btn-primary" onclick="startGame()">시작하기 🕊️</button>
  <button class="btn btn-ghost btn-sm" onclick="showBoard()">🏆 랭킹 보기</button>
</div>

<!-- ══ GAME ══ -->
<div id="s-game" class="screen">
  <div class="top-bar">
    <div class="lives" id="lives-ui"></div>
    <div class="stage-badge">STAGE <em id="stage-num">1</em></div>
  </div>
  <div class="q-card">
    <div class="q-label">다음 곱셈의 정답은?</div>
    <div class="q-text" id="q-text">? × ? = ?</div>
  </div>
  <div class="timer-wrap">
    <svg width="76" height="76" viewBox="0 0 76 76">
      <circle cx="38" cy="38" r="32" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="6"/>
      <circle id="t-ring" cx="38" cy="38" r="32" fill="none" stroke="#00C853" stroke-width="6"
        stroke-dasharray="201" stroke-dashoffset="0" transform="rotate(-90 38 38)"/>
      <text id="t-num" x="38" y="45" text-anchor="middle" font-size="26" font-weight="900" fill="white">5</text>
    </svg>
  </div>
  <div class="choices" id="choices"></div>
</div>

<!-- ══ RESULT ══ -->
<div id="s-result" class="screen">
  <div class="res-emoji" id="res-emoji">🕊️</div>
  <div class="res-title">게임 오버!</div>
  <div class="res-num" id="res-num">1</div>
  <div class="res-sub">스테이지 달성</div>
  <input class="name-input" id="name-in" placeholder="닉네임을 입력하세요" maxlength="12"/>
  <div class="res-btns">
    <button class="btn btn-primary" onclick="submitScore()">기록 저장 🏆</button>
    <button class="btn btn-ghost btn-sm" onclick="startGame()">다시 도전</button>
  </div>
</div>

<!-- ══ LEADERBOARD ══ -->
<div id="s-board" class="screen">
  <div class="board-hd">🏆 랭킹</div>
  <div class="board-list" id="board-list"></div>
  <button class="btn btn-ghost btn-sm" onclick="showHome()">← 돌아가기</button>
</div>

<!-- Flash overlay -->
<div id="flash"></div>

<script>
// ── SVG 비둘기 ──
function pigeonSVG(w, h) {
  return `<svg width="${w}" height="${h}" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="60" cy="116" rx="22" ry="5" fill="rgba(0,0,0,.18)"/>
    <path d="M27,76 Q14,90 11,98 Q27,88 42,85 Z" fill="#546E7A"/>
    <ellipse cx="57" cy="70" rx="28" ry="23" fill="#78909C"/>
    <ellipse cx="59" cy="76" rx="16" ry="13" fill="#ECEFF1"/>
    <path d="M35,64 Q21,53 26,40 Q40,51 49,66 Z" fill="#607D8B"/>
    <ellipse cx="53" cy="53" rx="11" ry="7" fill="#7C4DFF" opacity=".3"/>
    <circle cx="60" cy="41" r="19" fill="#90A4AE"/>
    <path d="M76,40 L87,37 L87,43 Z" fill="#FF8F00"/>
    <circle cx="70" cy="36" r="6" fill="#1A1A2E"/>
    <circle cx="71.8" cy="34.2" r="2.2" fill="white"/>
    <line x1="48" y1="91" x2="44" y2="103" stroke="#FF8F00" stroke-width="3" stroke-linecap="round"/>
    <line x1="44" y1="103" x2="37" y2="107" stroke="#FF8F00" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="44" y1="103" x2="44" y2="111" stroke="#FF8F00" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="44" y1="103" x2="51" y2="108" stroke="#FF8F00" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="64" y1="91" x2="68" y2="103" stroke="#FF8F00" stroke-width="3" stroke-linecap="round"/>
    <line x1="68" y1="103" x2="61" y2="107" stroke="#FF8F00" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="68" y1="103" x2="68" y2="111" stroke="#FF8F00" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="68" y1="103" x2="75" y2="108" stroke="#FF8F00" stroke-width="2.5" stroke-linecap="round"/>
  </svg>`;
}
function lifeSVG(alive) {
  const op = alive ? '1' : '0.2';
  return `<svg width="34" height="34" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" opacity="${op}">
    <path d="M27,76 Q14,90 11,98 Q27,88 42,85 Z" fill="#546E7A"/>
    <ellipse cx="57" cy="70" rx="28" ry="23" fill="#78909C"/>
    <ellipse cx="59" cy="76" rx="16" ry="13" fill="#ECEFF1"/>
    <path d="M35,64 Q21,53 26,40 Q40,51 49,66 Z" fill="#607D8B"/>
    <circle cx="60" cy="41" r="19" fill="#90A4AE"/>
    <path d="M76,40 L87,37 L87,43 Z" fill="#FF8F00"/>
    <circle cx="70" cy="36" r="6" fill="#1A1A2E"/>
    <circle cx="71.8" cy="34.2" r="2.2" fill="white"/>
  </svg>`;
}

// ── 저장 ──
function loadScores() {
  try { return JSON.parse(localStorage.getItem('gg_sc') || '[]'); } catch { return []; }
}
function saveScore(name, s) {
  const arr = loadScores();
  arr.push({ name: name.trim() || '익명', stage: s, ts: Date.now() });
  arr.sort((a, b) => b.stage - a.stage);
  try { localStorage.setItem('gg_sc', JSON.stringify(arr.slice(0, 30))); } catch {}
}
function bestScore() { const a = loadScores(); return a.length ? a[0].stage : 0; }

// ── 화면 ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showHome() {
  const b = bestScore();
  document.getElementById('home-best').innerHTML = b ? `최고 기록: <b>Stage ${b}</b>` : '아직 기록이 없습니다';
  showScreen('s-home');
}
function showBoard() { renderBoard(); showScreen('s-board'); }

// ── 게임 상태 ──
let stage = 1, lives = 3, timeLeft = 5, timerInt = null, busy = false;
let curA = 0, curB = 0, curAns = 0;
const SECS = 5, CIRC = 201; // 2π×32

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function diffRange(s) {
  if (s <= 3)  return { maxA: 4,  maxB: 6  };
  if (s <= 8)  return { maxA: 7,  maxB: 9  };
  if (s <= 15) return { maxA: 10, maxB: 12 };
  if (s <= 25) return { maxA: 13, maxB: 15 };
  return { maxA: 15, maxB: 15 };
}

function genProblem() {
  const { maxA, maxB } = diffRange(stage);
  curA   = rand(2, maxA);
  curB   = rand(2, maxB);
  curAns = curA * curB;
}

function genChoices() {
  const d = curA;
  let w1 = curAns - d, w2 = curAns + d;
  if (w1 <= 0) { w1 = curAns + d; w2 = curAns + 2 * d; }
  if (w1 === w2) w2 = curAns + 2 * d;
  return [curAns, w1, w2].sort(() => Math.random() - 0.5);
}

// ── 게임 시작 ──
function startGame() {
  stage = 1; lives = 3; busy = false;
  showScreen('s-game');
  nextQ();
}

function updateLives() {
  document.getElementById('lives-ui').innerHTML = [0,1,2].map(i => lifeSVG(i < lives)).join('');
}

function nextQ() {
  busy = false;
  genProblem();
  document.getElementById('stage-num').textContent = stage;
  document.getElementById('q-text').textContent = `${curA} × ${curB} = ?`;
  updateLives();

  const choices = genChoices();
  const el = document.getElementById('choices');
  el.innerHTML = '';
  choices.forEach((val, i) => {
    const btn = document.createElement('button');
    btn.className = 'c-btn';
    btn.dataset.val = val;
    btn.innerHTML = `<span class="idx">${i + 1}</span>${val}`;
    btn.addEventListener('click', () => pick(val, btn));
    el.appendChild(btn);
  });

  startTimer();
}

// ── 타이머 ──
function startTimer() {
  clearInterval(timerInt);
  timeLeft = SECS;
  renderTimer();
  timerInt = setInterval(() => {
    timeLeft--;
    renderTimer();
    if (timeLeft <= 0) { clearInterval(timerInt); onTimeout(); }
  }, 1000);
}

function renderTimer() {
  const ring = document.getElementById('t-ring');
  const num  = document.getElementById('t-num');
  num.textContent = timeLeft;
  ring.setAttribute('stroke-dashoffset', CIRC * (1 - timeLeft / SECS));
  ring.setAttribute('stroke', timeLeft > 3 ? '#00C853' : timeLeft > 1 ? '#FF9800' : '#FF1744');
}

function onTimeout() {
  if (busy) return;
  busy = true;
  highlightCorrect();
  flash('r');
  loseLife();
}

// ── 정답 선택 ──
function pick(val, btn) {
  if (busy) return;
  busy = true;
  clearInterval(timerInt);
  disableChoices();
  highlightCorrect();

  if (val === curAns) {
    flash('g');
    stage++;
    setTimeout(nextQ, 680);
  } else {
    btn.classList.add('wrong');
    flash('r');
    loseLife();
  }
}

function highlightCorrect() {
  document.querySelectorAll('.c-btn').forEach(b => {
    if (parseInt(b.dataset.val) === curAns) b.classList.add('correct');
  });
}
function disableChoices() {
  document.querySelectorAll('.c-btn').forEach(b => b.disabled = true);
}
function flash(cls) {
  const el = document.getElementById('flash');
  el.className = cls;
  setTimeout(() => el.className = '', 500);
}

// ── 목숨 감소 ──
function loseLife() {
  lives--;
  updateLives();
  if (lives <= 0) setTimeout(gameOver, 950);
  else setTimeout(nextQ, 950);
}

// ── 게임 오버 ──
function gameOver() {
  clearInterval(timerInt);
  document.getElementById('res-num').textContent = stage;
  document.getElementById('res-emoji').textContent = stage > 25 ? '🌟' : stage > 12 ? '🎉' : '🕊️';
  document.getElementById('name-in').value = '';
  showScreen('s-result');
}

function submitScore() {
  const name = document.getElementById('name-in').value;
  saveScore(name, stage);
  showBoard();
}

// ── 랭킹 ──
function renderBoard() {
  const scores = loadScores().slice(0, 10);
  const medals = ['g1','g2','g3'];
  const icons  = ['🥇','🥈','🥉'];
  document.getElementById('board-list').innerHTML = scores.length
    ? scores.map((s, i) => `
        <div class="b-row">
          <div class="b-rank ${medals[i]||''}">${icons[i] || i+1}</div>
          <div class="b-name">${s.name}</div>
          <div class="b-score">Stage ${s.stage}</div>
        </div>`).join('')
    : '<div class="b-empty">아직 기록이 없습니다 🕊️</div>';
}

// ── 초기화 ──
document.getElementById('splash-bird').innerHTML = pigeonSVG(150, 150);
document.getElementById('home-bird').innerHTML   = pigeonSVG(100, 100);
showHome();
setTimeout(() => { showHome(); }, 2600);
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
    navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
  }
</script>
</body>
</html>
